<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <style>
    .box { fill: #0f1724; stroke: #e6eef8; stroke-opacity:0.08; rx:10; }
    .label { fill: #f8fafc; font-family: Inter, Arial, sans-serif; font-size:13px; }
    .small { fill: #b8c6d9; font-size:12px; }
    .arrow { stroke: #9fb0cc; stroke-width:2; fill:none; marker-end: url(#arrowhead);} 
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9fb0cc" />
    </marker>
  </defs>

  <!-- Nodes -->
  <rect x="20" y="30" width="120" height="48" class="box" rx="8"/>
  <text x="80" y="60" text-anchor="middle" class="label">User</text>

  <rect x="170" y="30" width="160" height="48" class="box" rx="8"/>
  <text x="250" y="60" text-anchor="middle" class="label">Next.js App</text>

  <rect x="360" y="20" width="160" height="48" class="box" rx="8"/>
  <text x="440" y="50" text-anchor="middle" class="label">Jobs Listing</text>

  <rect x="540" y="20" width="160" height="48" class="box" rx="8"/>
  <text x="620" y="50" text-anchor="middle" class="label">Job Detail</text>

  <rect x="360" y="120" width="160" height="48" class="box" rx="8"/>
  <text x="440" y="150" text-anchor="middle" class="label">Post Job</text>

  <rect x="540" y="120" width="220" height="48" class="box" rx="8"/>
  <text x="650" y="150" text-anchor="middle" class="label">Data Source</text>

  <!-- Arrows -->
  <path class="arrow" d="M140 54 L170 54" />
  <path class="arrow" d="M330 54 L360 54" />
  <path class="arrow" d="M520 54 L540 54" />

  <path class="arrow" d="M440 68 L440 120" />
  <path class="arrow" d="M620 68 L620 120" />
  <path class="arrow" d="M380 144 L540 144" />

  <!-- Labels -->
  <text x="250" y="75" text-anchor="middle" class="small">routes, render UI</text>
  <text x="620" y="75" text-anchor="middle" class="small">/jobs/[id]</text>
  <text x="580" y="135" text-anchor="middle" class="small">read/write</text>

</svg>